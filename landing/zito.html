<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZITO | Z Generation Intelligent</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/hemedani/yekan@v3.0.0/font-face.css" rel="stylesheet" type="text/css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins&display=swap"
    rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+Arabic:wght@100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Poppins&display=swap"
    rel="stylesheet">

  <style>
    :root {
      /* رنگ‌های پس‌زمینه گرادیان */
      --bg-top: #010721;
      /* رنگ بالای صفحه (هماهنگ با لوگو) */
      --bg-avatar: #01081b;
      /* رنگ محدوده آواتار */
      --bg-bottom: #03081b;
      /* رنگ پایین صفحه (هماهنگ با آواتار) */

      --purple: #7d40ff;
      --blue: #3069ff;
      --ink: #ffffff;
      --font-fa: 'Yekan', "Noto Sans Arabic", 'Vazirmatn', Tahoma, sans-serif;
      --font-en: "Nunito", 'Poppins', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100vh;
      width: 100vw;
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-en);
      color: var(--ink);
      /* تغییر پس‌زمینه به گرادیان از بالا به پایین */
      background:
        linear-gradient(
          180deg,
          var(--bg-top) 0%,
          var(--bg-top) 22%,
          #01071f 38%,
          var(--bg-avatar) 58%,
          var(--bg-avatar) 76%,
          var(--bg-bottom) 100%
        );
      min-height: 100vh;
      width: 100vw;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.16) 0 1px, transparent 2px),
        radial-gradient(circle at 72% 24%, rgba(255,255,255,0.14) 0 1px, transparent 2px),
        radial-gradient(circle at 44% 72%, rgba(255,255,255,0.12) 0 1px, transparent 2px),
        radial-gradient(circle at 82% 68%, rgba(255,255,255,0.11) 0 1px, transparent 2px);
      background-size: 220px 220px, 260px 260px, 300px 300px, 280px 280px;
      animation: spaceDrift 20s linear infinite;
      opacity: 0.35;
    }

    body::after {
      background:
        radial-gradient(circle at 28% 24%, rgba(255,255,255,0.08) 0, transparent 35%),
        radial-gradient(circle at 78% 64%, rgba(255,255,255,0.06) 0, transparent 42%);
      filter: blur(30px);
      animation: spaceGlow 10s ease-in-out infinite alternate;
      opacity: 0.38;
    }

    @keyframes spaceDrift {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }

      to {
        transform: translate3d(-3%, 2%, 0) scale(1.04);
      }
    }

    @keyframes spaceGlow {
      from {
        transform: scale(0.96);
        opacity: 0.28;
      }

      to {
        transform: scale(1.04);
        opacity: 0.42;
      }
    }

    .nunito-regular {
      font-family: "Nunito", sans-serif;
      font-optical-sizing: auto;
      font-weight: 200;
      font-style: normal;
    }

    .noto-sans-arabic-regular {
      font-family: "Noto Sans Arabic", sans-serif;
      font-optical-sizing: auto;
      font-weight: 100;
      font-style: normal;
      font-variation-settings:
        "wdth" 100;
    }

    /* ---------- ستاره‌ها ---------- */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: #fff;
      opacity: 0.6;
      animation: twinkle 3.5s ease-in-out infinite;
    }

    .ambient-stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.95;
    }

    .ambient-star {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.35);
      animation: softPulse 5s ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .galaxy-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      opacity: 0.7;
    }

    .galaxy-glow .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(26px);
      opacity: 0.28;
      animation: driftGlow 16s ease-in-out infinite alternate;
    }

    .galaxy-glow .orb.one {
      width: 320px;
      height: 320px;
      left: -8%;
      top: -6%;
      background: radial-gradient(circle, rgba(125, 64, 255, 0.48) 0%, rgba(125, 64, 255, 0) 70%);
    }

    .galaxy-glow .orb.two {
      width: 260px;
      height: 260px;
      right: -6%;
      top: 18%;
      background: radial-gradient(circle, rgba(48, 105, 255, 0.42) 0%, rgba(48, 105, 255, 0) 72%);
      animation-duration: 18s;
    }

    .galaxy-glow .orb.three {
      width: 220px;
      height: 220px;
      left: 20%;
      bottom: -8%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 70%);
      animation-duration: 20s;
    }

    .meteor-field {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .meteor {
      position: absolute;
      left: var(--start-x);
      top: var(--start-y);
      width: var(--meteor-size, 88px);
      height: var(--meteor-size, 88px);
      border-radius: 999px;
      background:
        radial-gradient(circle at 68% 42%, rgba(255, 255, 255, 0.92) 0 4%, rgba(182, 224, 255, 0.46) 5% 12%, transparent 24%),
        radial-gradient(circle at 42% 56%, rgba(139, 104, 255, 0.36), transparent 46%),
        radial-gradient(circle, rgba(72, 127, 255, 0.18), transparent 68%);
      filter: blur(0.2px);
      box-shadow:
        0 0 18px rgba(128, 174, 255, 0.26),
        0 0 44px rgba(124, 81, 255, 0.14);
      opacity: 0;
      transform: translate3d(-12vw, 8vh, 0) scale(0.72) rotate(var(--tilt, -8deg));
      animation: meteorTrail var(--duration, 11s) ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .meteor::before {
      content: '';
      position: absolute;
      right: 58%;
      top: 50%;
      width: 128%;
      height: 34%;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(101, 141, 255, 0.16), rgba(179, 231, 255, 0.04));
      filter: blur(10px);
      transform: translateY(-50%) rotate(-9deg);
      transform-origin: right center;
    }

    .meteor::after {
      content: '';
      position: absolute;
      inset: 28%;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.82);
      box-shadow:
        0 0 12px rgba(255, 255, 255, 0.88),
        0 0 26px rgba(100, 170, 255, 0.46),
        0 0 48px rgba(137, 78, 255, 0.24);
      animation: cosmicBlink 2.8s ease-in-out infinite;
    }

    @keyframes meteorTrail {
      0% {
        opacity: 0;
        transform: translate3d(-12vw, 8vh, 0) scale(0.72) rotate(var(--tilt, -8deg));
      }

      12% {
        opacity: 0.42;
      }

      48% {
        opacity: 0.82;
        transform: translate3d(var(--float-x, 38vw), var(--float-y, 20vh), 0) scale(1) rotate(calc(var(--tilt, -8deg) + 8deg));
      }

      82% {
        opacity: 0.28;
      }

      100% {
        opacity: 0;
        transform: translate3d(82vw, var(--end-y, 46vh), 0) scale(0.74) rotate(calc(var(--tilt, -8deg) + 18deg));
      }
    }

    @keyframes cosmicBlink {
      0%,
      100% {
        opacity: 0.55;
        transform: scale(0.86);
      }

      50% {
        opacity: 1;
        transform: scale(1.08);
      }
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: .15;
        transform: scale(1);
      }

      50% {
        opacity: .9;
        transform: scale(1.4);
      }
    }

    @keyframes softPulse {
      0%,
      100% {
        opacity: 0.2;
        transform: scale(0.9);
      }

      50% {
        opacity: 0.9;
        transform: scale(1.3);
      }
    }

    @keyframes driftGlow {
      from {
        transform: translate3d(0, 0, 0) scale(1);
        opacity: 0.2;
      }

      to {
        transform: translate3d(2%, -2%, 0) scale(1.08);
        opacity: 0.35;
      }
    }

    .sparkle-big {
      position: absolute;
      z-index: 1;
      opacity: .8;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 8px 2px rgba(255, 255, 255, 0.6);
    }

    .s1 {
      top: 12%;
      left: 22%;
    }

    .s2 {
      top: 15%;
      right: 20%;
    }

    /* ---------- برند ---------- */
    .brand {
      position: relative;
      z-index: 5;
      margin-top: 6vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      pointer-events: none;
    }

    .brand::before {
      content: '';
      position: absolute;
      top: -28px;
      left: 50%;
      width: 230px;
      height: 210px;
      border-radius: 45%;
      background:
        radial-gradient(circle at 50% 42%, rgba(1, 7, 33, 0.96) 0%, rgba(1, 7, 33, 0.86) 42%, rgba(1, 7, 33, 0) 72%);
      filter: blur(10px);
      transform: translateX(-50%);
      z-index: -1;
    }

    /* درخشش لوگو حذف شد تا پس‌زمینه‌ی عکس معلوم نشه */
    .logo-img {
      width: 130px;
      height: auto;
      margin-bottom: 10px;
    }

    .wordmark-zito {
      margin-top: -5px;
      font-family: var(--font-en);
      font-weight: 800;
      font-size: 40px;
      letter-spacing: 6px;
      color: #ffffff;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8);
    }

    .sub-en {
      margin-top: 6px;
      font-family: var(--font-fa);
      font-weight: 400;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.7);
      max-width: 220px;
    }

    /* ---------- آواتار ---------- */
    .avatar-wrap {
      position: absolute;
      bottom: 32vh;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      animation: floaty 3.5s ease-in-out infinite;
    }

    .avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -22px -30px -18px;
      border-radius: 44%;
      background:
        radial-gradient(circle at 50% 50%, rgba(1, 8, 27, 0.96) 0%, rgba(1, 8, 27, 0.78) 46%, rgba(1, 8, 27, 0) 74%);
      filter: blur(9px);
      z-index: -1;
    }


    @keyframes floaty {

      0%,
      100% {
        transform: translateX(-50%) translateY(0);
      }

      50% {
        transform: translateX(-50%) translateY(-10px);
      }
    }

    .avatar-img {
      width: 110px;
      height: auto;
    }

    /* ---------- چت‌باکس (سمت راست) ---------- */
    .chat-bubble {
      position: absolute;
      left: calc(50% + 70px);
      right: auto;
      bottom: 42vh;
      transform: translateY(-20px);
      z-index: 4;
      max-width: 210px;
      min-width: 180px;
      background: rgba(10, 10, 30, 0.9);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(138, 107, 255, 0.4);
      border-radius: 16px 16px 16px 4px;
      padding: 14px 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
      opacity: 0;
      transition: opacity .6s ease, transform .6s ease;
    }

    .chat-bubble.show {
      opacity: 1;
      transform: translateY(-20px);
    }

    .chat-bubble::after {
      content: '';
      position: absolute;
      bottom: -16px;
      left: 25px;
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-top: 16px solid rgba(10, 10, 30, 0.9);
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
    }

    .chat-name {
      font-family: var(--font-fa);
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chat-name .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px #4ade80;
    }

    .chat-text {
      font-family: var(--font-fa);
      font-size: 13px;
      line-height: 1.8;
      color: #fff;
      min-height: 60px;
      direction: rtl;
      unicode-bidi: plaintext;
      letter-spacing: 0;
      word-spacing: normal;
      font-kerning: normal;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .typed-copy {
      direction: rtl;
      unicode-bidi: plaintext;
      white-space: normal;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 13px;
      background: #fff;
      margin-right: 2px;
      vertical-align: middle;
      animation: blink .9s step-start infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* ---------- دکمه ---------- */
    .cta-wrap {
      position: absolute;
      bottom: 4vh;
      left: 0;
      right: 0;
      z-index: 5;
      display: flex;
      justify-content: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .6s ease, transform .6s ease;
      pointer-events: none;
    }

    .cta-wrap.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .cta {
      font-family: var(--font-fa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      border: none;
      padding: 16px 48px;
      border-radius: 999px;
      cursor: pointer;
      background: linear-gradient(to right, #a733f5 0%, #2059e6 100%);
      box-shadow: 0 8px 26px rgba(56, 99, 253, 0.4), 0 0 40px rgba(48, 105, 255, 0.1);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .cta:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(48, 141, 255, 0.6);
    }

    .cta:active {
      transform: translateY(0px) scale(.98);
    }

    .phone-modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 22px;
      background: rgba(1, 5, 18, 0.66);
      backdrop-filter: blur(14px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .28s ease;
    }

    .phone-modal.show {
      opacity: 1;
      pointer-events: auto;
    }

    .phone-card {
      width: min(410px, 100%);
      border: 1px solid rgba(138, 107, 255, 0.42);
      border-radius: 26px;
      padding: 22px;
      background:
        radial-gradient(circle at 80% 0%, rgba(125, 64, 255, 0.22), transparent 42%),
        rgba(8, 13, 38, 0.92);
      box-shadow: 0 26px 80px rgba(0, 0, 0, 0.46), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transform: translateY(14px) scale(.98);
      transition: transform .28s ease;
    }

    .phone-modal.show .phone-card {
      transform: translateY(0) scale(1);
    }

    .phone-title {
      font-family: var(--font-fa);
      font-size: 21px;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
    }

    .phone-copy {
      font-family: var(--font-fa);
      color: rgba(255,255,255,.72);
      font-size: 13px;
      line-height: 2;
      text-align: center;
      margin-bottom: 18px;
    }

    .phone-form {
      display: flex;
      gap: 10px;
      align-items: center;
      direction: ltr;
    }

    .phone-input {
      flex: 1;
      min-width: 0;
      height: 52px;
      border-radius: 18px;
      border: 1px solid rgba(153, 170, 255, .24);
      background: rgba(2, 7, 27, .78);
      color: #fff;
      outline: none;
      padding: 0 15px;
      font: 700 16px var(--font-en);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06);
    }

    .phone-input:focus {
      border-color: rgba(78, 141, 255, .86);
      box-shadow: 0 0 0 4px rgba(48, 105, 255, .14), inset 0 1px 0 rgba(255,255,255,.06);
    }

    .phone-submit {
      height: 52px;
      border: 0;
      border-radius: 18px;
      padding: 0 18px;
      cursor: pointer;
      color: #fff;
      font-family: var(--font-fa);
      font-weight: 800;
      background: linear-gradient(to right, #a733f5 0%, #2059e6 100%);
      box-shadow: 0 12px 30px rgba(56, 99, 253, .36);
    }

    .phone-submit:disabled {
      opacity: .62;
      cursor: wait;
    }

    .phone-error {
      min-height: 24px;
      margin-top: 12px;
      color: #ff9db5;
      font-family: var(--font-fa);
      font-size: 12px;
      line-height: 1.8;
      text-align: center;
    }

    /* ========================================================= */
    /* تنظیمات دسکتاپ                                            */
    /* ========================================================= */
    @media (min-width: 1024px) {
      .brand {
        margin-top: 6vh;
      }

      .logo-img {
        width: 160px;
      }

      .wordmark-zito {
        font-size: 46px;
      }

      .sub-en {
        font-size: 17px;
      }

      .avatar-img {
        width: 130px;
      }

      .avatar-wrap {
        bottom: 28vh;
      }

      .chat-bubble {
        left: calc(50% + 80px);
        bottom: 32vh;
        max-width: 260px;
        min-width: 220px;
      }

      .chat-text {
        font-size: 14px;
        min-height: 80px;
      }

      .cta-wrap {
        bottom: 5vh;
      }

      .cta {
        padding: 18px 60px;
        font-size: 18px;
      }
    }

    /* ========================================================= */
    /* تنظیمات موبایل                                            */
    /* ========================================================= */
    @media (max-width: 640px) {
      .brand {
        margin-top: 10vh;
      }

      .logo-img {
        width: 180px;
        margin-bottom: 15px;
      }

      .wordmark-zito {
        font-size: 43px;
        letter-spacing: 4px;
      }

      .sub-en {
        font-size: 14px;
        font-weight: bold;
        max-width: 160px;
        margin-top: 0;
      }

      .avatar-img {
        width: 140px;
      }

      .avatar-wrap {
        bottom: 25vh;
      }

      .chat-bubble {
        left: auto;
        right: 4vw;
        bottom: 33vh;
        max-width: 120px;
        min-width: 120px;
        padding: 10px 14px;
      }

      .chat-bubble::after {
        left: 14px;
      }

      .chat-text {
        font-size: 10px;
        min-height: 40px;
      }

      .cta-wrap {
        bottom: 10vh;
      }

      .cta {
        width: 90%;
        padding: 10px 36px;
        font-size: 15px;
      }

      .meteor {
        width: var(--meteor-size-mobile, 58px);
        height: var(--meteor-size-mobile, 58px);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      body::before,
      body::after,
      .star,
      .ambient-star,
      .galaxy-glow .orb,
      .meteor,
      .avatar-wrap {
        animation: none;
      }
    }
  </style>
</head>

<body>

  <div class="stars" id="stars"></div>
  <div class="ambient-stars" aria-hidden="true"></div>
  <div class="galaxy-glow" aria-hidden="true">
    <div class="orb one"></div>
    <div class="orb two"></div>
    <div class="orb three"></div>
  </div>
  <div class="meteor-field" aria-hidden="true">
    <span class="meteor" style="--start-x: 7vw; --start-y: 10vh; --float-x: 38vw; --float-y: 16vh; --end-y: 34vh; --tilt: -14deg; --delay: .4s; --duration: 12.5s; --meteor-size: 92px; --meteor-size-mobile: 58px;"></span>
    <span class="meteor" style="--start-x: 58vw; --start-y: 5vh; --float-x: 18vw; --float-y: 25vh; --end-y: 52vh; --tilt: 10deg; --delay: 3.6s; --duration: 14s; --meteor-size: 74px; --meteor-size-mobile: 48px;"></span>
    <span class="meteor" style="--start-x: 18vw; --start-y: 32vh; --float-x: 44vw; --float-y: 8vh; --end-y: 28vh; --tilt: -4deg; --delay: 7.2s; --duration: 13.2s; --meteor-size: 62px; --meteor-size-mobile: 42px;"></span>
  </div>
  <div class="sparkle-big s1"></div>
  <div class="sparkle-big s2"></div>

  <!-- لوگو -->
  <div class="brand">
    <img class="logo-img" src="/landing-static/logo-z.png" alt="Z Logo">

    <div class="wordmark-zito">ZITO</div>
    <div class="sub-en">
     زیتو  <br>همراه هوشمند یادگیری تو
    </div>
  </div>

  <!-- آواتار -->
  <div class="avatar-wrap">
    <img class="avatar-img" src="/landing-static/zito-avatar.png" alt="Zito Avatar">
  </div>

  <!-- چت‌باکس -->
  <div class="chat-bubble" id="chatBubble">
    <div class="chat-name"><span class="dot"></span>زیتو</div>
    <div class="chat-text" id="chatText"><span class="cursor"></span></div>
  </div>

  <!-- دکمه -->
  <div class="cta-wrap" id="ctaWrap">
    <button class="cta">شروع کنید<span style="display: flex; align-items: center; justify-content: center; margin-inline-start: 8px;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2.5c2.8 1.9 4.5 5 4.5 8.6 0 1.6-.3 3.1-1 4.5l-1.8-1c.5-1.1.8-2.3.8-3.5 0-2.7-1.2-5.1-3-6.7-.3.3-.6.5-1 .8L12 2.5z" fill="#fff"/>
        <path d="M12 2.5C9.2 4.4 7.5 7.5 7.5 11.1c0 1.6.3 3.1 1 4.5l1.8-1c-.5-1.1-.8-2.3-.8-3.5 0-2.7 1.2-5.1 3-6.7z" fill="#fff" opacity=".7"/>
        <circle cx="12" cy="10.5" r="1.6" fill="#7d40ff"/>
        <path d="M9 15.5l-2.5 1.5.8-2.8" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M15 15.5l2.5 1.5-.8-2.8" stroke="#fff" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9.5 17.2c0 1.5.7 2.8 2.5 3.3 1.8-.5 2.5-1.8 2.5-3.3l-2.5-1.5-2.5 1.5z" fill="#fff" opacity=".9"/>
      </svg>
    </span></button>
  </div>

  <div class="phone-modal" id="phoneModal" aria-hidden="true">
    <div class="phone-card">
      <div class="phone-title">ورود به زیتو</div>
      <div class="phone-copy">شماره موبایلت را وارد کن تا مسیر یادگیریت با همین نام کاربری ذخیره شود.</div>
      <form class="phone-form" id="phoneForm">
        <input class="phone-input" id="phoneInput" inputmode="numeric" autocomplete="tel" placeholder="09123456789" maxlength="20">
        <button class="phone-submit" id="phoneSubmit" type="submit">ادامه</button>
      </form>
      <div class="phone-error" id="phoneError"></div>
    </div>
  </div>

  <script>
    const starsEl = document.getElementById('stars');
    const ambientStarsEl = document.querySelector('.ambient-stars');
    const STAR_COUNT = 80;
    for (let i = 0; i < STAR_COUNT; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 55 + '%';
      s.style.animationDelay = (Math.random() * 3.5) + 's';
      const size = Math.random() * 2.5 + 1.5;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      starsEl.appendChild(s);
    }

    const AMBIENT_STAR_COUNT = 16;
    for (let i = 0; i < AMBIENT_STAR_COUNT; i++) {
      const ambientStar = document.createElement('div');
      ambientStar.className = 'ambient-star';
      ambientStar.style.left = `${Math.random() * 100}%`;
      ambientStar.style.top = `${Math.random() * 100}%`;
      ambientStar.style.setProperty('--delay', `${Math.random() * 5}s`);
      ambientStar.style.width = `${Math.random() * 2 + 1}px`;
      ambientStar.style.height = ambientStar.style.width;
      ambientStarsEl.appendChild(ambientStar);
    }

    const bubble = document.getElementById('chatBubble');
    const textEl = document.getElementById('chatText');
    const ctaWrap = document.getElementById('ctaWrap');
    const phoneModal = document.getElementById('phoneModal');
    const phoneForm = document.getElementById('phoneForm');
    const phoneInput = document.getElementById('phoneInput');
    const phoneSubmit = document.getElementById('phoneSubmit');
    const phoneError = document.getElementById('phoneError');
    const fullText = 'سلام من زیتو هستم و قراره به تمام سوالاتی که تو حوزه کاریت داری جواب بدم. اگه آماده ای شروع کنیم؟';

    function typeWriter(text, el, speed) {
      return new Promise(resolve => {
        let i = 0;
        el.textContent = '';
        const typedCopy = document.createElement('span');
        typedCopy.className = 'typed-copy';
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        el.appendChild(typedCopy);
        el.appendChild(cursor);
        const interval = setInterval(() => {
          if (i < text.length) {
            typedCopy.textContent = text.slice(0, i + 1);
            i++;
          } else {
            clearInterval(interval);
            cursor.remove();
            resolve();
          }
        }, speed);
      });
    }

    window.addEventListener('load', () => {
      setTimeout(async () => {
        bubble.classList.add('show');
        await new Promise(r => setTimeout(r, 400));
        await typeWriter(fullText, textEl, 35);
        setTimeout(() => {
          ctaWrap.classList.add('show');
        }, 600);
      }, 800);
    });

    document.querySelector('.cta').addEventListener('click', () => {
      alert('فاز بعدی: مسیر ورود به زیتو از اینجا شروع می‌شه 🚀');
    });
    document.querySelector('.cta').addEventListener('click', (event) => {
      event.preventDefault();
      event.stopImmediatePropagation();
      const savedUserId = localStorage.getItem('zito_user_id');
      if (savedUserId) {
        window.location.href = `/chat?user_id=${encodeURIComponent(savedUserId)}`;
        return;
      }
      phoneModal.classList.add('show');
      phoneModal.setAttribute('aria-hidden', 'false');
      phoneInput.focus();
    }, true);

    phoneModal.addEventListener('click', (event) => {
      if (event.target === phoneModal) {
        phoneModal.classList.remove('show');
        phoneModal.setAttribute('aria-hidden', 'true');
      }
    });

    phoneForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      phoneError.textContent = '';
      phoneSubmit.disabled = true;
      try {
        const response = await fetch('/api/auth/phone', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone: phoneInput.value.trim() })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || 'ورود ناموفق بود. شماره را دوباره بررسی کن.');
        localStorage.setItem('zito_user_id', String(data.user_id));
        localStorage.setItem('zito_username', data.username);
        window.location.href = data.redirect_url;
      } catch (error) {
        phoneError.textContent = error.message;
      } finally {
        phoneSubmit.disabled = false;
      }
    });
  </script>

</body>

</html>
