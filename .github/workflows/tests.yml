name: Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        env:
          APP_NAME: ZitoTest
          APP_ENV: test
          AUTO_CREATE_TABLES: "true"
          DATABASE_URL: sqlite:///./test_ci.db
          ARVAN_API_BASE_URL: https://example.invalid/v1
          ARVAN_API_KEY: test-key
          ARVAN_MODEL: GPT-5.4-Mini
          ARVAN_TIMEOUT_SECONDS: "5"
          ARVAN_MOCK_AI: "true"
          ADMIN_USERNAME: zito_admin
          ADMIN_PASSWORD: local-test-admin-password
          ADMIN_SESSION_SECRET: local-test-session-secret-that-is-long-enough
          ADMIN_SESSION_DAYS: "7"
        run: python -m unittest discover -s tests
