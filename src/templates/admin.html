<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zito Admin</title>
  <link href="https://cdn.jsdelivr.net/gh/hemedani/yekan@v3.0.0/font-face.css" rel="stylesheet" type="text/css">
  <style>
    @font-face { font-family: "YekanZito"; src: local("Yekan Bakh"), local("IRANYekan"), local("B Yekan"), local("Yekan"); font-display: swap; }
    * { box-sizing: border-box; }
    :root { color-scheme: dark; --font-yekan: "YekanZito", "Yekan", "Yekan Bakh", "IRANYekan", "B Yekan", Tahoma, Arial, sans-serif; --bg: #050817; --card: rgba(13, 23, 54, .78); --card2: rgba(18, 30, 68, .92); --line: rgba(131, 119, 255, .24); --text: #f4f7ff; --muted: #95a3c5; --purple: #8d3dff; --blue: #2372ff; --cyan: #37e6ff; --danger: #ff4f7b; --ok: #52eba0; }
    html, body, button, input, textarea, select { font-family: var(--font-yekan); }
    body * { font-family: inherit; }
    body { margin: 0; min-height: 100vh; font-family: var(--font-yekan); color: var(--text); background: radial-gradient(circle at 50% -10%, rgba(141, 61, 255, .34), transparent 35%), radial-gradient(circle at 10% 25%, rgba(55, 230, 255, .12), transparent 28%), linear-gradient(180deg, #050817, #071026 62%, #030613); }
    body::before { content: ""; position: fixed; inset: 0; pointer-events: none; background-image: radial-gradient(circle, rgba(255,255,255,.6) 0 1px, transparent 1.6px); background-size: 96px 96px; opacity: .18; }
    main { position: relative; z-index: 1; width: min(1180px, 100%); margin: 0 auto; padding: 22px 16px 34px; }
    .top { display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 16px; margin-bottom: 18px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .mark { width: 48px; height: 48px; border-radius: 17px; display: grid; place-items: center; font-weight: 900; font-size: 25px; background: linear-gradient(135deg, var(--purple), var(--blue) 70%, var(--cyan)); box-shadow: 0 0 32px rgba(112, 92, 255, .48); }
    h1 { margin: 0; font-size: 24px; }
    .muted { margin-top: 5px; color: var(--muted); font-size: 13px; }
    .badge { width: fit-content; border: 1px solid var(--line); background: rgba(255,255,255,.06); border-radius: 999px; padding: 10px 13px; color: #d9e4ff; font-size: 12px; box-shadow: inset 0 1px 0 rgba(255,255,255,.06); backdrop-filter: blur(14px); }
    .top-actions { display: flex; align-items: center; justify-content: end; gap: 10px; flex-wrap: wrap; }
    .toolbar { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 12px; margin-bottom: 16px; border: 1px solid var(--line); border-radius: 22px; background: rgba(10, 19, 47, .72); box-shadow: 0 22px 70px rgba(0,0,0,.30), inset 0 1px 0 rgba(255,255,255,.05); }
    input { width: 100%; height: 48px; border: 1px solid rgba(151, 164, 255, .18); border-radius: 16px; background: rgba(3, 8, 25, .65); color: var(--text); padding: 0 14px; font: inherit; outline: none; transition: .18s ease; }
    input::placeholder { color: #7482a8; }
    input:focus { border-color: rgba(55, 230, 255, .68); box-shadow: 0 0 0 4px rgba(55, 230, 255, .10); }
    button { border: 0; border-radius: 16px; min-height: 48px; padding: 0 15px; color: white; font: inherit; font-weight: 800; cursor: pointer; background: linear-gradient(135deg, var(--purple), var(--blue)); box-shadow: 0 13px 30px rgba(91, 83, 255, .30); transition: transform .16s ease, opacity .16s ease; }
    button:hover { transform: translateY(-1px); }
    button.danger { background: linear-gradient(135deg, #ff4f7b, #b4235a); box-shadow: 0 13px 30px rgba(255, 79, 123, .20); }
    button.ghost { background: rgba(255,255,255,.07); border: 1px solid var(--line); box-shadow: none; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 14px; }
    .card { position: relative; overflow: hidden; border: 1px solid var(--line); border-radius: 24px; padding: 16px; background: linear-gradient(180deg, rgba(18, 30, 68, .88), rgba(9, 18, 45, .84)); box-shadow: 0 24px 70px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.06); animation: pop .24s ease both; }
    .card::before { content: ""; position: absolute; inset: -80px auto auto -80px; width: 180px; height: 180px; border-radius: 50%; background: rgba(141, 61, 255, .18); filter: blur(10px); }
    .card-head { position: relative; display: flex; justify-content: space-between; gap: 12px; margin-bottom: 13px; }
    .name { font-weight: 900; font-size: 17px; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 5px; direction: ltr; text-align: right; }
    .track { color: #dfe7ff; border: 1px solid rgba(55, 230, 255, .18); background: rgba(55, 230, 255, .08); border-radius: 999px; padding: 8px 10px; height: fit-content; font-size: 11px; }
    .answer { position: relative; margin-top: 9px; padding: 11px; border-radius: 17px; line-height: 1.8; background: rgba(4, 10, 30, .56); border: 1px solid rgba(151, 164, 255, .12); }
    .answer strong { display: block; color: #bba7ff; margin-bottom: 5px; font-size: 12px; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .actions button { min-height: 38px; border-radius: 13px; padding: 0 12px; font-size: 12px; }
    .empty { border: 1px solid var(--line); border-radius: 24px; padding: 30px; color: var(--muted); text-align: center; background: rgba(13, 23, 54, .72); box-shadow: 0 22px 70px rgba(0,0,0,.28); }
    @keyframes pop { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @media (max-width: 720px) { main { padding: 14px 10px 24px; } .top, .toolbar { grid-template-columns: 1fr; } .grid { grid-template-columns: 1fr; } .badge { justify-self: start; } }
  </style>
</head>
<body>
  <main>
    <header class="top">
      <div class="brand">
        <div class="mark">Z</div>
        <div><h1>پنل مدیریت زیتو</h1><div class="muted">کنترل کاربران، پاسخ‌های تایید شده و مسیر آموزشی</div></div>
      </div>
      <div id="count" class="badge">در حال بارگذاری</div>
      <button class="ghost" onclick="logoutAdmin()">خروج</button>
    </header>

    <div class="toolbar">
      <input id="search" placeholder="جستجو بر اساس نام، مسیر آموزشی یا پاسخ‌ها..." />
      <button onclick="loadUsers()">به‌روزرسانی</button>
    </div>

    <section id="content" class="empty">در حال بارگذاری...</section>
  </main>

  <script>
    const content = document.querySelector("#content");
    const count = document.querySelector("#count");
    const search = document.querySelector("#search");
    let users = [];

    function escapeHtml(value) { return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
    function escapeAttr(value) { return String(value ?? "").replaceAll("\\", "\\\\").replaceAll("'", "\\'").replaceAll("\n", "\\n"); }
    function filteredUsers() { const term = search.value.trim().toLowerCase(); if (!term) return users; return users.filter((user) => [user.full_name, user.username, user.profession, ...user.answers.map((answer) => answer.answer_text)].filter(Boolean).join(" ").toLowerCase().includes(term)); }

    function render() {
      const rows = filteredUsers();
      count.textContent = `${users.length} کاربر ثبت شده`;
      if (!rows.length) { content.className = "empty"; content.textContent = users.length ? "نتیجه‌ای برای این جستجو پیدا نشد." : "هنوز کاربری ثبت نشده است."; return; }
      content.className = "grid";
      content.innerHTML = rows.map((user) => `
        <article class="card">
          <div class="card-head">
            <div><div class="name">${escapeHtml(user.full_name || "کاربر بدون نام")}</div><div class="meta">ID ${user.id} · ${escapeHtml(user.username || "no username")}</div></div>
            <div class="track">${escapeHtml(user.profession || "مسیر نامشخص")}</div>
          </div>
          ${user.answers.map((answer) => `<div class="answer"><strong>${escapeHtml(answer.question_text)}</strong><div>${escapeHtml(answer.answer_text)}</div><div class="actions"><button onclick="editAnswer(${answer.id}, '${escapeAttr(answer.answer_text)}')">ویرایش</button></div></div>`).join("") || "<div class='answer'>هنوز پاسخی ثبت نشده است.</div>"}
          <div class="actions"><button class="danger" onclick="deleteUser(${user.id})">حذف کاربر</button></div>
        </article>`).join("");
    }

    async function loadUsers() { const res = await fetch("/api/admin/users"); if (res.status === 401) { window.location.href = "/admin/login"; return; } if (!res.ok) throw new Error("دسترسی ادمین تایید نشد یا دریافت اطلاعات ناموفق بود."); users = await res.json(); render(); }
    async function editAnswer(id, current) { const next = prompt("متن جدید پاسخ:", current); if (!next || next.trim() === current.trim()) return; const res = await fetch(`/api/admin/answers/${id}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ answer_text: next.trim() }) }); if (!res.ok) { alert("ویرایش انجام نشد."); return; } await loadUsers(); }
    async function deleteUser(id) { if (!confirm("این کاربر حذف شود؟")) return; const res = await fetch(`/api/admin/users/${id}`, { method: "DELETE" }); if (!res.ok) { alert("حذف انجام نشد."); return; } await loadUsers(); }
    async function logoutAdmin() { await fetch("/api/admin/logout", { method: "POST" }); window.location.href = "/admin/login"; }

    search.addEventListener("input", render);
    loadUsers().catch((error) => { count.textContent = "خطا"; content.className = "empty"; content.textContent = error.message; });
  </script>
</body>
</html>
